<style>
body { margin:0; font-family:Arial; background:#d4af37; }

/* MENU */
.menu-btn {
position:fixed; top:15px; left:15px;
background:#fff; color:#111;
width:50px; height:50px;
display:flex; align-items:center; justify-content:center;
border-radius:10px; font-size:26px; cursor:pointer;
z-index:1001;
}

.menu {
position:fixed; top:0; left:-260px;
width:260px; height:100%;
background:#111; padding:80px 20px;
transition:.3s;
z-index:1000;
}

.menu.active { left:0; }

.menu a {
display:flex;
align-items:center;
gap:15px;
color:#fff;
padding:15px 0;
border-bottom:1px solid #222;
text-decoration:none;
}

/* LOGO */
.logo-container {
max-width:1300px;
margin:0 auto 10px;
padding:3px;
}

.logo-container img {
width:100%;
height:300px;
object-fit:cover;
object-position:center 59%;
border-radius:10px;
}

/* BIO */
.bio {
max-width:1300px;
margin:15px auto;
padding:3px;
background:#ffffff;
border-radius:10px;
text-align:center;
}

/* GRID */
.produtos {
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:6px;
max-width:1300px;
margin:0 auto;
}

.card {
background:#fff;
border-radius:8px;
padding:10px;
text-align:center;
}

/* IMAGEM */
.img-box {
width:100%;
aspect-ratio:1/1;
overflow:hidden;
border-radius:6px;
cursor:pointer;
}

.img-box img {
width:100%;
height:100%;
object-fit:cover;
}

/* QTD */
.qtd-container {
display:flex;
justify-content:center;
align-items:center;
gap:8px;
margin:10px 0;
}

.qtd-container button {
width:35px;
height:35px;
border:none;
background:#d4af37;
color:#fff;
font-size:18px;
border-radius:6px;
cursor:pointer;
}

.qtd-container input {
width:50px;
height:35px;
text-align:center;
border:1px solid #ccc;
border-radius:6px;
font-weight:bold;
}

/* BOTÃO */
.btn-whats {
background:#25d366;
color:#fff;
padding:10px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.btn-whats:hover {
background:#1ebe5d;
}

/* LIGHTBOX */
#lightbox {
display:none;
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
z-index:3000;
justify-content:center;
align-items:center;
}

/* 🔥 AJUSTE PRA NÃO BLOQUEAR CLIQUE */
#lightbox img {
max-width:90%;
max-height:80%;
pointer-events:none;
}

/* 🔥 BOTÕES CORRIGIDOS */
.lb-btn {
position:absolute;
color:#fff;
font-size:45px;
cursor:pointer;
z-index:4000;
user-select:none;
}

.lb-close { top:20px; right:30px; }

.lb-prev {
left:20px;
top:50%;
transform:translateY(-50%);
}

.lb-next {
right:20px;
top:50%;
transform:translateY(-50%);
}

/* FLOAT */
.float-zap {
position:fixed;
bottom:20px;
right:20px;
background:#25d366;
color:#fff;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
text-decoration:none;
}
</style>
</head>

<body>

</nav>

<div class="logo-container">

<div class="bio">
<h2>Forno de Ouro Salgados</h2>
<h3>Fábrica de salgados congelados, crus, fritos e assados, croissants, pães de queijo tradicionais, gourmets e recheados!</h3>

<p>

</a>
</p>

<p>📍 Rua dos Inconfidentes 86, São Carlos - SP</p>
</div>

<div class="produtos" id="grid"></div>

<div id="lightbox">
<span class="lb-btn lb-close" onclick="closeLightbox()">✕</span>
<span class="lb-btn lb-prev" onclick="changeImage(-1)">❮</span>
<img id="lightbox-img">
<span class="lb-btn lb-next" onclick="changeImage(1)">❯</span>
</div>

<a href="https://wa.me/5516997106341" class="float-zap">

</a>

<script>

let numero = "5516997106341";
let currentImg = 1;

function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

window.onload = function(){
const grid = document.getElementById("grid");

for(let i=1;i<=30;i++){
let card = document.createElement("div");
card.className="card";

card.innerHTML = `
<div class="img-box" onclick="openLightbox(${i})">
<img src="salgado${i}.jpg" onerror="this.src='https://via.placeholder.com/300'">
</div>

<div class="qtd-container">
<button onclick="alterarQtd(${i},-1)">-</button>
<input id="qtd-${i}" value="1" readonly>
<button onclick="alterarQtd(${i},1)">+</button>
</div>

<div class="btn-whats" onclick="fazerPedido(${i})">
<i class="fa-brands fa-whatsapp"></i> PEDIR
</div>
`;

grid.appendChild(card);
}
}

function openLightbox(n){
currentImg = n;
document.getElementById("lightbox-img").src = `salgado${n}.jpg`;
document.getElementById("lightbox").style.display = "flex";
}

function closeLightbox(){
document.getElementById("lightbox").style.display = "none";
}

function changeImage(dir){
currentImg += dir;
if(currentImg > 30) currentImg = 1;
if(currentImg < 1) currentImg = 30;
document.getElementById("lightbox-img").src = `salgado${currentImg}.jpg`;
}

function alterarQtd(id,delta){
let el = document.getElementById("qtd-"+id);
let v = parseInt(el.value)+delta;
if(v<1)v=1;
el.value=v;
}

function fazerPedido(id){
let qtd = document.getElementById("qtd-"+id).value;
let msg = encodeURIComponent(`Olá! Quero ${qtd} unidades do salgado ${id}`);
window.open(`https://wa.me/${numero}?text=${msg}`);
}

</script>
